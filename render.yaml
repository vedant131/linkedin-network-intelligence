services:
  - type: web
    name: networkiq-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: AI_MODE
        value: offline
      - key: COMPANY_TIER_SCORING
        value: "true"
      - key: TWILIO_ACCOUNT_SID
        sync: false          # set manually in Render dashboard
      - key: TWILIO_AUTH_TOKEN
        sync: false          # set manually in Render dashboard
      - key: TWILIO_WHATSAPP_FROM
        value: "whatsapp:+14155238886"
      - key: WEBSITE_URL
        value: "https://vedant131.github.io/linkedin-network-intelligence"
    disk:
      name: networkiq-data
      mountPath: /data
      sizeGB: 1
